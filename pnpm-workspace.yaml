packages:
    - coulis
    - examples/*
    - tools/*
allowBuilds:
    "@swc/core": false
    esbuild: false
    msgpackr-extract: false
    sharp: false
    unrs-resolver: false
minimumReleaseAgeExclude:
    - "@adbayb/stack@2.36.1"
    - "@expo/cli@56.1.11"
    - "@expo/config-plugins@56.0.8"
    - "@expo/config@56.0.9"
    - "@expo/fingerprint@0.19.2"
    - "@expo/image-utils@0.10.1"
    - "@expo/metro-config@56.0.12"
    - "@expo/metro-runtime@56.0.12"
    - "@expo/require-utils@56.1.3"
    - "@expo/ui@56.0.13"
    - "@vitest/eslint-plugin@1.6.18"
    - babel-preset-expo@56.0.12
    - expo-asset@56.0.14
    - expo-constants@56.0.15
    - expo-modules-autolinking@56.0.12
    - expo-router@56.2.6
    - expo@56.0.4
    - termost@1.9.1
publicHoistPattern:
    - "*changesets*"
    - "*commitlint*"
    - "*eslint*"
    - "*prettier*"
    - "*turbo*"
    - "*typescript*"
    - "*types*"
